<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family: Roboto, Arial, sans-serif;
    background:#ede7f6;
    display:flex;
    justify-content:center;
    padding:40px 10px;
}

/* FORM WRAPPER */

.form-wrapper{
    width:100%;
    max-width:720px;
}

.top-bar{
    height:12px;
    background:#673ab7;
    border-radius:8px 8px 0 0;
}

.form-container{
    background:white;
    border-radius:0 0 8px 8px;
    box-shadow:0 1px 5px rgba(0,0,0,0.2);
    padding:30px;
}

.form-title{
    font-size:34px;
    font-weight:700;
    margin-bottom:15px;
}

.form-description{
    font-size:16px;
    color:#5f6368;
    margin-bottom:25px;
}

.required-note{
    color:#d93025;
    font-size:14px;
    margin-bottom:25px;
}

.section{
    background:#f8f9fa;
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
}

input[type="text"]{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-bottom:1px solid #ccc;
    font-size:16px;
}

.option{
    margin:10px 0;
}

.button-area{
    margin-top:30px;
    text-align:center;
    position:relative;
    height:120px;
}

.next-btn{
    padding:14px 35px;
    border:none;
    border-radius:40px;
    background:linear-gradient(45deg,#673ab7,#9c27b0);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.hint-btn{
    position:absolute;
    padding:12px 20px;
    border:none;
    border-radius:50px;
    background:#d93025;
    color:white;
    cursor:pointer;
}

.hidden{
    display:none;
}

/* BIRTHDAY CARD */

.birthday{
    margin-top:40px;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    padding:60px;
    border-radius:20px;
    text-align:center;
    max-width:720px;

    box-shadow:
        0 0 20px rgba(255,105,180,0.4),
        0 0 40px rgba(255,64,129,0.3);

    animation:cardGlow 4s infinite alternate;
}

@keyframes cardGlow{
from{
box-shadow:0 0 20px rgba(255,105,180,0.4);
}
to{
box-shadow:0 0 50px rgba(255,64,129,0.5);
}
}

/* TITLE */

.birthday-title{
font-size:46px;
text-shadow:
0 0 10px #fff,
0 0 20px #ff80ab,
0 0 40px #ff4081;

animation:titleFloat 3s infinite;
}

@keyframes titleFloat{
0%{transform:translateY(0);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0);}
}

/* NAME */

.glow-name{
font-size:42px;
font-weight:700;
display:block;
margin-bottom:25px;

background:linear-gradient(90deg,#ff80ab,#ff4081,#ff80ab);
background-size:200%;

background-clip:text;
-webkit-background-clip:text;

color:transparent;
-webkit-text-fill-color:transparent;

animation:nameShine 4s linear infinite, heartbeat 2s infinite;
}

@keyframes heartbeat{
0%{transform:scale(1);}
25%{transform:scale(1.08);}
40%{transform:scale(1);}
60%{transform:scale(1.08);}
100%{transform:scale(1);}
}

@keyframes nameShine{
0%{background-position:0%;}
100%{background-position:200%;}
}

#dynamicText{
font-size:22px;
line-height:1.9;
max-width:600px;
margin:0 auto;
}

.secret-btn{
margin-top:35px;
padding:16px 40px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff4081,#ff80ab);
color:white;
font-size:17px;
cursor:pointer;

box-shadow:0 0 15px #ff4081;
}

.secret-btn:hover{
transform:scale(1.08);
}

/* HEARTS */

.heart{
position:fixed;
pointer-events:none;
animation:floatUp linear forwards;
}

@keyframes floatUp{
0%{
transform:translateY(100vh) scale(.6);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

/* SPARKLES */

.sparkle{
position:fixed;
pointer-events:none;
animation:sparkleFloat 6s linear infinite;
}

@keyframes sparkleFloat{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

</style>
</head>

<body>

<div class="form-wrapper" id="formBox">

<div class="top-bar"></div>

<div class="form-container">

<h1 class="form-title">
A Study on the Impact of Digital Marketing on Social Media Users and Business Performance
</h1>

<p class="form-description">
This survey is conducted as part of a final year BBA academic project.
</p>

<p class="required-note">* Indicates required question</p>

<div class="section">
<label>Name *</label>
<input type="text" id="nameInput">
</div>

<div class="section">
<label>Gender *</label>
<div class="option"><input type="radio" name="gender"> Male</div>
<div class="option"><input type="radio" name="gender"> Female</div>
<div class="option"><input type="radio" name="gender"> Other</div>
</div>

<div class="section">
<label>Age Group *</label>
<div class="option"><input type="radio" name="age"> Below 20</div>
<div class="option"><input type="radio" name="age"> 21–30</div>
<div class="option"><input type="radio" name="age"> 31–40</div>
<div class="option"><input type="radio" name="age"> Above 40</div>
</div>

<div class="section">
<label>Employment Status *</label>
<div class="option"><input type="radio" name="job"> Student</div>
<div class="option"><input type="radio" name="job"> Employed</div>
<div class="option"><input type="radio" name="job"> Part time</div>
<div class="option"><input type="radio" name="job"> Unemployed</div>
</div>

<div class="button-area">
<button id="nextBtn" class="next-btn" onclick="startPrank()">Next →</button>
<button id="hintBtn" class="hint-btn hidden" onclick="startPrank()"></button>
</div>

</div>
</div>

<div class="birthday hidden" id="birthdayBox">
<h1 class="birthday-title">🎉 Happy Birthday 🎉</h1>
<div id="dynamicText"></div>
<button class="secret-btn hidden" id="secretBtn" onclick="showSecret()">
There’s something I want to tell you… 😌
</button>
</div>

<script>

let stage = 0;

const hints = [
"🤔 hey unaku iniku enn achu tareyuma?",
"🎁 iniku oru mukiyama nalu ?",
"💭 enna nu nayabagam vanducha ?",
"🎂 inum tareyala ya korangu inda button ha click panu sollura?"
];

function startPrank(){

const name=document.getElementById("nameInput").value;
const gender=document.querySelector('input[name="gender"]:checked');
const age=document.querySelector('input[name="age"]:checked');
const job=document.querySelector('input[name="job"]:checked');

if(!name||!gender||!age||!job){
alert("Please fill all required fields.");
return;
}

if(stage<4){

document.getElementById("nextBtn").classList.add("hidden");

const hintBtn=document.getElementById("hintBtn");
hintBtn.classList.remove("hidden");
hintBtn.innerText=hints[stage];

hintBtn.style.left=Math.random()*400+"px";
hintBtn.style.top=Math.random()*80+"px";

stage++;

}else{
revealBirthday(name);
}
}

function revealBirthday(name){

document.getElementById("formBox").style.display="none";
document.getElementById("birthdayBox").classList.remove("hidden");

const dynamic=document.getElementById("dynamicText");

dynamic.innerHTML="✨ <span class='glow-name'>"+name+"</span> ✨<br><br>";

const message =
"Today isn’t just another day… it’s my special ones birthday 🎂✨ " +

"And I just wanted to say something simple but real. " +

"You’re honestly one of those people who make things feel a little brighter just by being around. 😊💫 " +

"Your smile, your laugh, the way you talk… there’s just something really nice about it. 💜 " +

"I hope this year brings you a lot of happiness, good memories, and moments that make you smile for no reason. 🌸✨ " +

"And I’m really glad that I got the chance to know someone like you. ❤️ " +

"So yeah… last ha once again — Happy Birthday MARIYAM 🎉🎂💖";

typeWriter(message,0);

createHearts();
createSparkles();

document.getElementById("secretBtn").classList.remove("hidden");
}

function showSecret(){
document.getElementById("dynamicText").innerHTML+=
"<br><br>And maybe… you mean more to me than I usually say 😌💜";
}

function typeWriter(text,index){
if(index<text.length){
document.getElementById("dynamicText").innerHTML+=text.charAt(index);
setTimeout(()=>typeWriter(text,index+1),20);
}
}

function createHearts(){

const hearts=["❤️","💖","💗","💘","💝"];

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";

heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*30)+"px";
heart.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

},300);

}

function createSparkles(){

const sparkles=["✨","💫","🌸"];

setInterval(()=>{

let s=document.createElement("div");
s.className="sparkle";

s.innerHTML=sparkles[Math.floor(Math.random()*sparkles.length)];

s.style.left=Math.random()*100+"vw";
s.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(s);

setTimeout(()=>s.remove(),6000);

},500);

}

</script>

</body>
</html>
